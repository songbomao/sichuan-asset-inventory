# 前端静态资源（部署时放到 /usr/share/nginx/html/sichuan-asset-inventory/）
location /sichuan-asset-inventory/ {
    alias /usr/share/nginx/html/sichuan-asset-inventory/;
    try_files $uri /sichuan-asset-inventory/index.html;
}

# API 反向代理到后端（同域，消除跨域）
location /api/ {
    proxy_pass https://scwms.chinaccsscm.cn:8096;
    proxy_ssl_verify off;
    proxy_set_header Host scwms.chinaccsscm.cn;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
