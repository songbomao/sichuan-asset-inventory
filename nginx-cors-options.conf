# CORS OPTIONS 预检处理 - 绕过 WAF 拦截
# 部署位置：添加到 /api/Account/ 的 location 块最前面
# 作用：在 nginx 层直接返回 204，不经过后端和 WAF

location /api/Account/ {
    # ========== 关键：OPTIONS 预检直接返回 204 ==========
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://songbomao.github.io' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
        add_header 'Access-Control-Max-Age' 1728000 always;
        add_header 'Content-Type' 'text/plain charset=UTF-8' always;
        add_header 'Content-Length' 0 always;
        return 204;
    }
    # ========== OPTIONS 处理结束 ==========

    # 正常请求代理到后端
    proxy_pass https://scwms.chinaccsscm.cn:8096;
    proxy_ssl_verify off;
    proxy_set_header Host scwms.chinaccsscm.cn;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 前端静态资源配置（如果需要从本机提供）
location /sichuan-asset-inventory/ {
    alias /usr/share/nginx/html/sichuan-asset-inventory/;
    try_files $uri /sichuan-asset-inventory/index.html;
}
